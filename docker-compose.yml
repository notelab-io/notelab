services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      notelab:
        condition: service_healthy
    environment:
      NOTELAB_SITE_ADDRESS: ${NOTELAB_SITE_ADDRESS:-http://localhost}
    ports:
      - "${NOTELAB_HTTP_PORT:-80}:80"
      - "${NOTELAB_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  notelab:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-notelab}:${POSTGRES_PASSWORD:-notelab}@postgres:5432/${POSTGRES_DB:-notelab}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-only-change-me-notelab-auth-secret-32}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-local-only-change-me-notelab-oauth-state-secret-32}
      IMAGE_STORAGE_MODE: s3
      R2_ENDPOINT: http://minio:9000
      R2_BUCKET_NAME: ${MINIO_BUCKET:-notelab}
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-notelab}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-notelab-minio-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      SLACK_OAUTH_CLIENT_ID: ${SLACK_OAUTH_CLIENT_ID:-}
      SLACK_OAUTH_CLIENT_SECRET: ${SLACK_OAUTH_CLIENT_SECRET:-}
      LINEAR_OAUTH_CLIENT_ID: ${LINEAR_OAUTH_CLIENT_ID:-}
      LINEAR_OAUTH_CLIENT_SECRET: ${LINEAR_OAUTH_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notelab}
      POSTGRES_USER: ${POSTGRES_USER:-notelab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notelab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-notelab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-notelab-minio-password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-notelab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-notelab-minio-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-notelab}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set notelab http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "notelab/$$MINIO_BUCKET"
        mc anonymous set none "notelab/$$MINIO_BUCKET"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  minio_data:
